<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato</title>
  </head>
  <body>
    <fieldset>
      <legend>Entre em contato</legend>
      <div id="assunto">
        <span><strong>Assunto: </strong></span>
        <select name="Assunto" id="">
          <option value="Suport" selected>Suporte</option>
          <option value="Sugestao">sugestão</option>
          <option value="Reclamacao">Reclamação</option></select
        ><br /><br />
      </div>
      <div id="dados">
        <span><strong>Nome completo: </strong></span><br /><input
          type="text"
          name="Seu nome"
          placeholder="Seu nome"
        /><br /><br />
        <span><strong>Email: </strong></span><br /><input
          type="email"
          name="Seu email"
          placeholder="email@seudominio.com.br"
        /><br /><br />
        <span><strong>Mensagem: </strong></span><br /><textarea
          name=""
          id=""
          cols="30"
          rows="10"
        ></textarea>
        <br /><br /><br />
        <input type="checkbox" name="check" /><span
          >Aceito receber novidades por email.</span
        ><br /><br />
        <input type="submit" name="Enviar" id="" />
      </div>
    </fieldset>
  </body>
</html>
